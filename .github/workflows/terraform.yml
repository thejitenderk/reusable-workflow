name: Terraform Infra Pipeline

on:
  workflow_call:
    secrets:
      AZURE_CLIENT_ID:
      AZURE_TENANT_ID:
      AZURE_SUBSCRIPTION_ID:
      
        required: true
    inputs:

      terraform_version:
        required: false
        type: string
        default: "1.6.6"

      environment:
        required: true
        type: string

      working_directory:
        required: true
        type: string
        default: "environment"
      runner:
        required: true
        type: string
        default: "ubuntu-latest"
      


jobs:
  terraform:
    name: Terraform Setup
    runs-on: ${{ inputs.runner }}
    env:
      ARM_AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_AZURE_TENANT_ID: ${{  secrets.AZURE_TENANT_ID }}
      ARM_AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}/${{ inputs.environment }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Format
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false
